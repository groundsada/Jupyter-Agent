name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write      # create GitHub release + upload assets
  packages: write      # push to ghcr.io
  id-token: write      # OIDC token for PyPI trusted publishing

jobs:
  # ── 1. Build Go binaries for all platforms ──────────────────────────────────
  build-binaries:
    name: Build binary (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: windows
            goarch: amd64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
          cache-dependency-path: gateway/go.sum

      - name: Build
        shell: bash
        run: |
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          OUTPUT="jhub-ssh-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build \
              -trimpath \
              -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
              -o "../dist/${OUTPUT}" \
              ./cmd/jhub-ssh
          echo "Built: ${OUTPUT}"
        working-directory: gateway

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/jhub-ssh-*
          retention-days: 1

  # ── 2. Build & push Docker images ──────────────────────────────────────────
  build-images:
    name: Push Docker images
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3       # for cross-platform builds
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build & push sidecar
        uses: docker/build-push-action@v5
        with:
          context: sidecar
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jhub-ssh-sidecar:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/jhub-ssh-sidecar:latest

      - name: Build & push gateway
        uses: docker/build-push-action@v5
        with:
          context: gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jhub-ssh-gateway:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/jhub-ssh-gateway:latest

  # ── 3. Create GitHub Release with binaries ──────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum jhub-ssh-* > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/jhub-ssh-*
            dist/checksums.txt

  # ── 4. Package & publish VS Code extension ──────────────────────────────────
  publish-vscode:
    name: Publish VS Code extension (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: github-release      # binaries must be on GitHub Releases first
    strategy:
      matrix:
        include:
          - target: linux-x64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: darwin-x64
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
          - target: win32-x64
            goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Download the binary for this platform and place it into bin/
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: vscode-extension/bin/

      - name: Rename binary to standard name
        working-directory: vscode-extension/bin
        run: |
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          mv jhub-ssh-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} jhub-ssh${EXT}
          chmod +x jhub-ssh${EXT} 2>/dev/null || true

      - name: Install dependencies
        run: npm ci
        working-directory: vscode-extension

      - name: Compile TypeScript
        run: npm run build
        working-directory: vscode-extension

      - name: Package extension for ${{ matrix.target }}
        run: |
          npx vsce package \
            --target ${{ matrix.target }} \
            --out jhub-vscode-${{ matrix.target }}.vsix
        working-directory: vscode-extension

      # Marketplace publish skipped (requires paid Azure account + VSCE_PAT secret)
      # To enable: uncomment and add VSCE_PAT secret + register publisher at marketplace.visualstudio.com
      # - name: Publish to marketplace
      #   run: npx vsce publish --target ${{ matrix.target }} --packagePath jhub-vscode-${{ matrix.target }}.vsix
      #   working-directory: vscode-extension
      #   env:
      #     VSCE_PAT: ${{ secrets.VSCE_PAT }}

      # Attach .vsix to the GitHub release for manual installs
      - name: Upload .vsix to release
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-extension/jhub-vscode-${{ matrix.target }}.vsix

  # ── 5. Publish Python packages to PyPI ──────────────────────────────────────
  publish-python:
    name: Publish Python packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build hub-extension wheel
        run: |
          pip install build
          python -m build
        working-directory: hub-extension

      - name: Build lab-extension wheel
        run: |
          pip install build jupyterlab~=4.0 hatch-jupyter-builder
          npm install
          npm run build:prod
          python -m build
        working-directory: lab-extension

      - name: Collect dist files
        run: |
          mkdir -p combined-dist
          cp hub-extension/dist/* combined-dist/
          cp lab-extension/dist/* combined-dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: combined-dist/

  # ── 6. Publish Helm chart to GitHub Pages (OCI) ─────────────────────────────
  publish-helm:
    name: Publish Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v3
        with:
          version: "3.14.0"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.meta.outputs.version }}/" \
            helm/jupyterhub-ssh/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.meta.outputs.version }}\"/" \
            helm/jupyterhub-ssh/Chart.yaml

      - name: Package chart
        run: helm package helm/jupyterhub-ssh/ --destination dist/

      - name: Push chart to GHCR OCI registry
        run: |
          helm push dist/jupyterhub-ssh-${{ steps.meta.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/charts
