name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Go: gateway binary ──────────────────────────────────────────────────────
  test-go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
          cache-dependency-path: gateway/go.sum
      - name: Test
        run: go test ./...
        working-directory: gateway
      - name: Build (sanity check all targets)
        run: |
          for target in "linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64"; do
            GOOS=${target%/*} GOARCH=${target#*/} CGO_ENABLED=0 \
              go build -o /dev/null ./cmd/jhub-ssh
            echo "✓ $target"
          done
        working-directory: gateway

  # ── Python: hub extension + integration tests ───────────────────────────────
  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test deps
        run: pip install pytest anyio
      - name: Test sidecar spec
        run: python3 -m pytest sidecar/tests/ -v
      - name: Test hub extension
        run: python3 -m pytest hub-extension/tests/ -v
      - name: Test integration (mock, no cluster)
        run: python3 -m pytest tests/integration/ -v

  # ── TypeScript: VS Code extension ──────────────────────────────────────────
  test-vscode-extension:
    name: VS Code extension tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: vscode-extension
      - name: Compile TypeScript
        run: npm run build
        working-directory: vscode-extension
      - name: Run tests
        run: npm test
        working-directory: vscode-extension

  # ── TypeScript: JupyterLab extension ───────────────────────────────────────
  test-lab-extension:
    name: JupyterLab extension compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install JupyterLab (provides jlpm + jupyter labextension)
        run: pip install jupyterlab
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: lab-extension/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: lab-extension
      - name: Compile TypeScript
        run: npm run build
        working-directory: lab-extension

  # ── Docker: build images (no push on PRs) ──────────────────────────────────
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build sidecar image
        uses: docker/build-push-action@v5
        with:
          context: sidecar
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/jhub-ssh-sidecar:ci
      - name: Build gateway image
        uses: docker/build-push-action@v5
        with:
          context: gateway
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/jhub-ssh-gateway:ci

  # ── Helm: lint chart ────────────────────────────────────────────────────────
  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v3
        with:
          version: "3.14.0"
      - name: Lint chart
        run: helm lint helm/jupyterhub-ssh/
